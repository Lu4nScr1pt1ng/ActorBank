worker_processes auto;
events { worker_connections 2048; }

http {
    access_log off;

    # Docker's embedded DNS. Re-resolving the "app" service name every few seconds is how nginx
    # auto-discovers replicas: `docker compose up -d --scale app=N` just works, no config changes.
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 8080;

        location / {
            # A variable in proxy_pass forces per-request resolution via the resolver above, so the
            # set of backends tracks the running replicas (Docker DNS round-robins the addresses).
            set $app app:8080;
            proxy_pass http://$app$request_uri;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_next_upstream error timeout http_502 http_503;
        }
    }
}
