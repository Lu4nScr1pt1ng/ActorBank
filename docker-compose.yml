# Postgres + a scalable API/silo service + an nginx load balancer.
# The SQL in ./db/init creates + tunes the Orleans tables on first boot.
#
#   docker compose up -d                 # 1 silo behind nginx on :8080
#   docker compose up -d --scale app=3   # 3 silos, one cluster, nginx auto-discovers them
#
# nginx round-robins across the `app` replicas via Docker DNS (no config changes on scale). All
# silos share the ML-DSA signing-key volume; key creation is race-safe, so a token works on any node.

x-actorbank: &actorbank
  image: actorbank-api
  build: .
  environment:
    ConnectionStrings__Orleans: "Host=postgres;Port=5432;Database=orleans;Username=orleans;Password=orleans"
    ASPNETCORE_ENVIRONMENT: "Production"
  volumes:
    - actorbank-keys:/keys

services:
  postgres:
    image: postgres:18
    container_name: actorbank-postgres
    environment:
      POSTGRES_DB: orleans
      POSTGRES_USER: orleans
      POSTGRES_PASSWORD: orleans
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - actorbank-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orleans -d orleans"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The API + Orleans silo. No container_name / host port, so it scales freely.
  app:
    <<: *actorbank
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  nginx:
    image: nginx:1.27-alpine
    container_name: actorbank-nginx
    depends_on:
      - app
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  actorbank-pgdata:
  actorbank-keys:
